<div class="services-list-page">
  <div class="page-header">
    <h2>Catálogo de Serviços</h2>
    <div class="header-actions">
      <p-toggleButton
        [(ngModel)]="showInactive"
        onLabel="Mostrar inativos"
        offLabel="Só ativos"
        (onChange)="load()"
      />
      <a routerLink="novo">
        <p-button label="Novo serviço" icon="pi pi-plus" />
      </a>
    </div>
  </div>

  <p-table
    [value]="items()"
    [loading]="loading()"
    [rowHover]="true"
    responsiveLayout="scroll"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Duração</th>
        <th>Preço</th>
        <th>Confirmação manual</th>
        <th>Status</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-service>
      <tr>
        <td>{{ service.name }}</td>
        <td>{{ service.category || '—' }}</td>
        <td>{{ service.duration_minutes }} min</td>
        <td>{{ formatPrice(service.price) }}</td>
        <td>
          <p-tag
            [value]="service.requires_confirmation ? 'Sim' : 'Não'"
            [severity]="service.requires_confirmation ? 'warn' : 'success'"
          />
        </td>
        <td>
          <p-tag
            [value]="service.is_active ? 'Ativo' : 'Inativo'"
            [severity]="service.is_active ? 'success' : 'secondary'"
          />
        </td>
        <td class="actions">
          <a [routerLink]="[service.id]">
            <p-button icon="pi pi-pencil" [text]="true" severity="secondary" />
          </a>
          <p-button
            [icon]="service.is_active ? 'pi pi-eye-slash' : 'pi pi-eye'"
            [text]="true"
            [severity]="service.is_active ? 'danger' : 'success'"
            (click)="toggleActive(service)"
            [pTooltip]="service.is_active ? 'Desativar' : 'Ativar'"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="empty-message">Nenhum serviço encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
