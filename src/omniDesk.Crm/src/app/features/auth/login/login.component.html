<div class="login-container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <h1>Acesso OmniDesk</h1>

    @if (error()) {
      <div class="error-message" role="alert">{{ error() }}</div>
    }

    <div class="field">
      <label for="email">E-mail</label>
      <input id="email" type="email" formControlName="email" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input id="password" type="password" formControlName="password" autocomplete="current-password" />
    </div>

    <div class="field field--checkbox">
      <input id="rememberMe" type="checkbox" formControlName="rememberMe" />
      <label for="rememberMe">Lembrar-me por 30 dias</label>
    </div>

    <app-turnstile (verified)="onTurnstileVerified($event)" />

    <button type="submit" [disabled]="!canSubmit">
      @if (loading()) { Entrando... } @else { Entrar }
    </button>

    <div class="links">
      <a routerLink="/esqueci-senha">Esqueci minha senha</a>
    </div>
  </form>
</div>
