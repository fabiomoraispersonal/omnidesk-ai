<div class="forgot-password-container">
  @if (submitted()) {
    <div class="confirmation">
      <h1>Verifique seu e-mail</h1>
      <p>Se esse e-mail estiver cadastrado, você receberá um link para redefinir sua senha em breve.</p>
      <a routerLink="/login">Voltar ao login</a>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <h1>Esqueci minha senha</h1>
      <p>Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>

      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />
      </div>

      <app-turnstile (verified)="onTurnstileVerified($event)" />

      <button type="submit" [disabled]="!canSubmit">
        @if (loading()) { Enviando... } @else { Enviar link }
      </button>

      <a routerLink="/login">Voltar ao login</a>
    </form>
  }
</div>
