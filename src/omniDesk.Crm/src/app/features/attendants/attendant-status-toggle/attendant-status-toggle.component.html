<div class="status-toggle">
  <p-toast></p-toast>
  <p-selectButton
    [options]="options"
    optionLabel="label"
    optionValue="value"
    [ngModel]="current()"
    (ngModelChange)="onChange($event)"
    [allowEmpty]="false"
    aria-label="Mudar status de presença">
  </p-selectButton>
</div>
